version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgres_go_pro
    restart: always
    environment:
      POSTGRES_DB: go_pro_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: