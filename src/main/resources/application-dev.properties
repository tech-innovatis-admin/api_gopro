# Ambiente de desenvolvimento local
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
spring.flyway.locations=classpath:db/migration/core,classpath:db/migration/dev
spring.flyway.baseline-on-migrate=true

# Storage local para uploads de documentos quando S3 nao estiver configurado
app.documents.local.base-path=./storage/documents
app.documents.s3.bucket=gopro-documents-dev
