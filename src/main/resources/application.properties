spring.application.name=api-da-gopro
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8081}

# Configuracao do Banco de Dados
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/gopro}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:innovatis}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracao do Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/core
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# Documentos (S3)
app.documents.s3.bucket=${APP_DOCUMENTS_S3_BUCKET:gopro-documents-dev}

# Limite maximo para valor de projeto (BRL)
app.project.max-contract-value=${APP_PROJECT_MAX_CONTRACT_VALUE:9999999999999.99}

# Upload (multipart)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Configuracao do Pool de Conexoes (opcional, melhora desempenho)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Compressao HTTP (reduz payload em respostas JSON grandes)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# CORS (configuracao base compartilhada por profile)
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.exposed-headers=Location
app.cors.allow-credentials=true

# Auth / RBAC
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:change-this-local-secret-with-at-least-32-characters}
app.auth.jwt.expiration-seconds=${APP_AUTH_JWT_EXPIRATION_SECONDS:43200}
app.auth.jwt.issuer=${APP_AUTH_JWT_ISSUER:api-da-gopro}
app.url=${APP_URL:http://localhost:3000}
app.auth.invite.base-url=${APP_AUTH_INVITE_BASE_URL:http://localhost:3000/register}
app.auth.invite.default-expiration-hours=${APP_AUTH_INVITE_DEFAULT_EXPIRATION_HOURS:72}
app.auth.password-reset.expiration-minutes=${APP_AUTH_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.auth.rate-limit.forgot-password.max-attempts=${APP_AUTH_RATE_LIMIT_FORGOT_PASSWORD_MAX_ATTEMPTS:5}
app.auth.rate-limit.reset-password.max-attempts=${APP_AUTH_RATE_LIMIT_RESET_PASSWORD_MAX_ATTEMPTS:10}
app.auth.rate-limit.login.max-attempts=${APP_AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:8}
app.auth.rate-limit.register.max-attempts=${APP_AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:12}
app.auth.rate-limit.window-seconds=${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:900}

# Bootstrap controlado de superadmin (rode uma vez com enabled=true e depois volte para false)
app.auth.bootstrap.superadmin.enabled=${APP_AUTH_BOOTSTRAP_SUPERADMIN_ENABLED:false}
app.auth.bootstrap.superadmin.email=${APP_AUTH_BOOTSTRAP_SUPERADMIN_EMAIL:}
app.auth.bootstrap.superadmin.username=${APP_AUTH_BOOTSTRAP_SUPERADMIN_USERNAME:}
app.auth.bootstrap.superadmin.password=${APP_AUTH_BOOTSTRAP_SUPERADMIN_PASSWORD:}
app.auth.bootstrap.superadmin.full-name=${APP_AUTH_BOOTSTRAP_SUPERADMIN_FULL_NAME:Tech Innovatis}

# Sendgrid (automacao de emails)
sendgrid.enabled=${SENDGRID_ENABLED:true}
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:tech@innovatismc.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:Innovatis}
sendgrid.template.project-deadline-id=${SENDGRID_TEMPLATE_PROJECT_DEADLINE_ID:}
sendgrid.template.invite-id=${SENDGRID_TEMPLATE_INVITE_ID:}
sendgrid.template.password-reset-id=${SENDGRID_TEMPLATE_PASSWORD_RESET_ID:}

# Frontend / notificacoes por email
app.frontend.contract-base-url=${APP_FRONTEND_CONTRACT_BASE_URL:http://localhost:3000/contratos}
app.notifications.email.project-deadline.enabled=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_ENABLED:false}
app.notifications.email.project-deadline.cron=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_CRON:0 0 9 * * *}
app.notifications.email.project-deadline.zone=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_ZONE:America/Sao_Paulo}
app.notifications.email.project-deadline.days-before=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_DAYS_BEFORE:30,7,1}
app.notifications.email.project-deadline.recipient-roles=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_RECIPIENT_ROLES:SUPERADMIN,ADMIN,OWNER}
app.notifications.email.project-deadline.batch-size=${APP_NOTIFICATIONS_EMAIL_PROJECT_DEADLINE_BATCH_SIZE:200}
