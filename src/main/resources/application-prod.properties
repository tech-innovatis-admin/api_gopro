# Ambiente de producao
# Defina APP_CORS_ALLOWED_ORIGINS com os dominios permitidos, separados por virgula.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://gopro.innovatismc.com}
spring.flyway.locations=classpath:db/migration/prod
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
app.documents.s3.bucket=gopro-documents-dev
